name: Sentinel Discover
description: >
  Auto-detect enabled Sentinel scopes for a repo. Outputs a JSON array.
inputs:
  config_path:
    description: "Path to sentinel.toml relative to workspace"
    required: false
    default: ".github/sentinel.toml"
outputs:
  scopes:
    description: "JSON array of enabled scope names"
    value: ${{ steps.run.outputs.scopes }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.12"

    - id: run
      shell: bash
      env:
        CONFIG_PATH: ${{ inputs.config_path }}
      run: |
        set -euo pipefail
        # Run as a module from the action root so scripts/ is never sys.path[0].
        cd "${{ github.action_path }}/.."
        SCOPES=$(python -m scripts.sentinel \
          --mode discover \
          --config "$CONFIG_PATH" \
          --workdir "${{ github.workspace }}")
        {
          echo "scopes<<SENTINEL_EOF"
          echo "$SCOPES"
          echo "SENTINEL_EOF"
        } >> "$GITHUB_OUTPUT"
