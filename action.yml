name: sentinel
description: >
  Open auto-PRs for OSV-driven dependency bumps. Runs one scope at a time;
  may produce multiple PRs per invocation (one per detected drift).
inputs:
  scope:
    description: "Scope name (rust / go / javascript / python / <custom name>)"
    required: true
  config_path:
    description: "Path to sentinel.toml relative to workspace"
    required: false
    default: ".github/sentinel.toml"
  dry_run:
    description: "Detect + print plan but don't open PRs"
    required: false
    default: "false"
  github_token:
    description: "Token used to call gh API, push branches, and open PRs"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"

    - shell: bash
      run: pip install --quiet "ruamel.yaml==0.19.1" "tomlkit==0.15.0"

    - shell: bash
      env:
        OSV_SCANNER_VERSION: v2.4.0
        OSV_SCANNER_SHA256: 15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
      run: |
        set -euo pipefail
        curl -fsSL \
          "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
          -o /usr/local/bin/osv-scanner
        echo "${OSV_SCANNER_SHA256}  /usr/local/bin/osv-scanner" | sha256sum --check --strict
        chmod +x /usr/local/bin/osv-scanner

    - shell: bash
      run: |
        set -euo pipefail
        git -C "${{ github.workspace }}" config user.name "sentinel-bot"
        git -C "${{ github.workspace }}" config user.email "sentinel@users.noreply.github.com"

    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        FLAGS=""
        if [[ "${{ inputs.dry_run }}" == "true" ]]; then FLAGS="--dry-run"; fi
        python ${{ github.action_path }}/scripts/sentinel.py \
          --mode run \
          --scope "${{ inputs.scope }}" \
          --config "${{ inputs.config_path }}" \
          --workdir "${{ github.workspace }}" \
          $FLAGS
