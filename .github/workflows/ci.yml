name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install "pytest==9.1.1" "ruff==0.15.18" "ruamel.yaml==0.19.1" "tomlkit==0.15.0"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -v
