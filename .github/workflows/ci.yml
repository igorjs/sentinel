name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install "pytest==9.1.1" "ruff==0.15.18" "ruamel.yaml==0.19.1" "tomlkit==0.15.0"
      - run: ruff check .
      - run: ruff format --check .
      # Install the SAME osv-scanner the action pins, so the integration test
      # exercises the real binary's JSON schema (keep version/sha in sync with action.yml).
      - name: Install pinned osv-scanner
        env:
          OSV_SCANNER_VERSION: v2.4.0
          OSV_SCANNER_SHA256: 15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          echo "${OSV_SCANNER_SHA256}  /usr/local/bin/osv-scanner" | sha256sum --check --strict
          chmod +x /usr/local/bin/osv-scanner
      - run: pytest -v
