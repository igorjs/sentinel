name: Bug Report
description: Report a bug or unexpected behaviour.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Provide the smallest possible code, commands, or steps that reproduce the bug.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the project are you using?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Operating system, runtime, and any other relevant context (e.g. macOS 15.4 / Node 24.14 / Docker 27.3)"
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Paste the full error message or stack trace if applicable.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help (screenshots, related issues, workarounds).
    validations:
      required: false
